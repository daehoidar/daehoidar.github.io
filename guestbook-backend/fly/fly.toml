app = "cafe-minu-guestbook"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  ALLOWED_ORIGINS = "https://daehoidar.github.io,http://localhost:5500,http://127.0.0.1:5500"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "guestbook_data"
  destination = "/app/data"