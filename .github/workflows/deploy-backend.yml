name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'guestbook-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guestbook-backend
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly/fly.toml --dockerfile fly/Dockerfile --buildkit
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
